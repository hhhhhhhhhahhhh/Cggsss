name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: İnşa etmek
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Repo kökünde hiç .zip dosyası bulunamadı."
            exit 1
          fi
          echo "Bulunan zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE"

          PROJECT_DIR=$(find . -maxdepth 1 -type d -name "JarvisAndroid*" | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Zip içinden JarvisAndroid klasörü çıkmadı."
            exit 1
          fi
          if [ "$PROJECT_DIR" != "./JarvisAndroid" ]; then
            mv "$PROJECT_DIR" JarvisAndroid
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # android-actions/setup-android@v3, cmdline-tools/16.0 ile sıklıkla
      # "sdkmanager failed with exit code 1" hatası veriyor (lisans kabulü /
      # indirme adımında sessizce patlıyor). Bunun yerine SDK'yı elle kuruyoruz:
      # daha az "sihirli" ama çok daha güvenilir.
      - name: Set up Android SDK
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"

          TOOLS_URL=$(curl -s https://developer.android.com/studio \
            | grep -o 'https://dl.google.com/android/repository/commandlinetools-linux-[0-9]*_latest.zip' \
            | head -n 1)
          echo "İndirilecek cmdline-tools: $TOOLS_URL"
          curl -sSL -o cmdline-tools.zip "$TOOLS_URL"
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          rm cmdline-tools.zip

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
          # Proje compileSdk=36 kullanıyor (app/build.gradle.kts) — platform ve
          # build-tools sürümünü buna göre kuruyoruz.
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          build-root-directory: JarvisAndroid

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace
        working-directory: JarvisAndroid

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: JarvisAndroid/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
