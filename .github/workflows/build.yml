name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: İnşa etmek
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Repo kökünde hiç .zip dosyası bulunamadı."
            exit 1
          fi
          echo "Bulunan zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE"

          PROJECT_DIR=$(find . -maxdepth 1 -type d -name "JarvisAndroid*" | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Zip içinden JarvisAndroid klasörü çıkmadı."
            exit 1
          fi
          if [ "$PROJECT_DIR" != "./JarvisAndroid" ]; then
            mv "$PROJECT_DIR" JarvisAndroid
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Projede gradlew/gradlew.bat/gradle-wrapper.jar dosyaları yok
      # (zip'ten hiç çıkmadılar), bu yüzden wrapper yerine Gradle'ı
      # doğrudan kuruyoruz. Sürüm, projedeki
      # gradle/wrapper/gradle-wrapper.properties dosyasıyla eşleşiyor.
      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          build-root-directory: JarvisAndroid

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace
        working-directory: JarvisAndroid

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: JarvisAndroid/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
